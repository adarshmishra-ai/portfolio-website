<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wargh — Select Portfolio</title>
  <link rel="stylesheet" href="gateway.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div class="bg-mesh"></div>
  
  <div class="gateway-container">
    <h1 class="gateway-title">Welcome</h1>
    <p class="gateway-subtitle">Select your experience to proceed</p>
    
    <div class="options-wrapper">
      
      <!-- Portfolio 1: The original one -->
      <a href="portfolio1.html" class="portal-card portal-1">
        <div class="portal-content">
          <h2 class="portal-title">Portfolio 1</h2>
          <p class="portal-desc">AI Innovator & Developer. Experience the cyberpunk and tech-driven creative interface.</p>
          <span class="portal-btn">Enter V1</span>
        </div>
      </a>

      <!-- Portfolio 2: The new 3D Royal one -->
      <a href="portfolio2.html" class="portal-card portal-2">
        <div class="portal-content">
          <h2 class="portal-title">Portfolio 2</h2>
          <p class="portal-desc">Premium 3D Elegance. Experience the royal, highly professional luxury interface.</p>
          <span class="portal-btn">Enter V2</span>
        </div>
      </a>

    </div>
  </div>

  <script>
    // Subtle 3D tilt effect for the cards
    const cards = document.querySelectorAll('.portal-card');

    cards.forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = ((y - centerY) / centerY) * -10;
        const rotateY = ((x - centerX) / centerX) * 10;
        
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
      });
    });
  </script>
</body>
</html>
